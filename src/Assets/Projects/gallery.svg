<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160e22"/>
      <stop offset="1" stop-color="#241436"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="700" cy="60" r="180" fill="#4ade80" opacity="0.07"/>
  <circle cx="80" cy="420" r="140" fill="#4ade80" opacity="0.05"/>

  <text x="56" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#f3ecfa">AuthImage Gallery</text>
  <rect x="56" y="100" width="120" height="4" rx="2" fill="url(#glow)"/>
  <rect x="56" y="100" width="46" height="4" rx="2" fill="#4ade80"/>

  <rect x="40" y="126" width="720" height="216" rx="12" fill="#120a1c" stroke="#4ade80" stroke-opacity="0.35"/>
  <rect x="40" y="126" width="720" height="34" rx="12" fill="#1a1226"/>
  <rect x="40" y="148" width="720" height="12" fill="#1a1226"/>
  <circle cx="64" cy="143" r="6" fill="#ff5f57"/>
  <circle cx="84" cy="143" r="6" fill="#febc2e"/>
  <circle cx="104" cy="143" r="6" fill="#28c840"/>

  <text x="76" y="184" font-family="Consolas, Menlo, monospace" font-size="15" fill="#f3ecfa"><tspan fill="#4ade80" font-weight="700">$</tspan> npm run gallery</text>
  <text x="76" y="212" font-family="Consolas, Menlo, monospace" font-size="15" fill="#b39ddb">[oauth] Google sign-in ✓</text>
  <text x="76" y="242" font-family="Consolas, Menlo, monospace" font-size="15" fill="#b39ddb">[upload] IMG_2041.jpg (2.3 MB)</text>
  <text x="76" y="272" font-family="Consolas, Menlo, monospace" font-size="15" fill="#b39ddb">[crop] 1:1 in-browser crop applied</text>
  <text x="76" y="302" font-family="Consolas, Menlo, monospace" font-size="15" fill="#4ade80">✓ added to your gallery</text>

  <rect x="56" y="368" rx="12" width="65" height="26" fill="none" stroke="#4ade80" stroke-opacity="0.55"/>
  <text x="88.5" y="386" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#e4d8f0">React</text>
  <rect x="133" y="368" rx="12" width="65" height="26" fill="none" stroke="#4ade80" stroke-opacity="0.55"/>
  <text x="165.5" y="386" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#e4d8f0">OAuth</text>
  <rect x="210" y="368" rx="12" width="130.6" height="26" fill="none" stroke="#4ade80" stroke-opacity="0.55"/>
  <text x="275.3" y="386" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#e4d8f0">Cloud Storage</text>
